name: Build and Deploy

on:
  push:
    branches: [ "deploy" ]
  pull_request:
    branches: [ "deploy" ]

jobs:
  build:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v3

    - run: yarn install
    - run: yarn build
    - run: |
          git config --global user.email 'github-actions@github.com'
          git config --global user.name 'github-actions'
          git remote set-url origin https://${{ secrets.PAT }}@github.com/ktoll2/ktoll2.github.io.git
          CI=false && yarn deploy


