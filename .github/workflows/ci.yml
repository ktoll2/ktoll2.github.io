name: Build and Deploy

on:
  push:
    branches: [ "deploy" ]
  pull_request:
    branches: [ "deploy" ]

jobs:
  build:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v2
    - run: yarn install
    - run: yarn build
    - run: |
          CI=false && yarn deploy


